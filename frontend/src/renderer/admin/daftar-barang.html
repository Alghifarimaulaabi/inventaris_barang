<div>
  <h2 class="text-2xl font-bold text-slate-800 mb-4">Kelola Barang</h2>
  <p class="text-slate-500 mb-6">Manajemen data inventaris: Edit atau hapus barang.</p>
  
  <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
    <div id="barangContainer" class="text-sm text-slate-500">Memuat data barang...</div>
  </div>

  <!-- Modal Edit Barang -->
  <div id="modalEditBarang" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-slate-800">Edit Data Barang</h3>
        <button id="closeEditModalBtn" class="text-slate-400 hover:text-slate-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      
      <form id="formEditBarang" class="space-y-4">
        <input type="hidden" id="editId">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nama Barang</label>
          <input type="text" id="editNama" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Harga (Rp)</label>
            <input type="number" id="editHarga" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Stok</label>
            <input type="number" id="editStok" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
          <select id="editKategori" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <option value="Elektronik">Elektronik</option>
            <option value="Perabotan">Perabotan</option>
            <option value="Alat Tulis">Alat Tulis</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Barcode / Kode Unit</label>
          <input type="text" id="editBarcode" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div id="editErrorMessage" class="text-red-500 text-sm hidden"></div>

        <div class="pt-4 flex justify-end gap-3">
          <button type="button" id="cancelEditBtn" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg font-medium hover:bg-slate-200 transition-colors">Batal</button>
          <button type="submit" id="saveEditBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors">Simpan Perubahan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Konfirmasi Hapus -->
  <div id="modalDeleteBarang" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl text-center">
      <div class="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
      </div>
      <h3 class="text-xl font-bold text-slate-800 mb-2">Hapus Barang?</h3>
      <p class="text-slate-500 mb-6">Data barang yang dihapus tidak dapat dikembalikan.</p>
      <input type="hidden" id="deleteId">
      <div class="flex gap-3">
        <button id="cancelDeleteBtn" class="flex-1 px-4 py-2 bg-slate-100 text-slate-700 rounded-lg font-medium hover:bg-slate-200 transition-colors">Batal</button>
        <button id="confirmDeleteBtn" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors">Hapus</button>
      </div>
    </div>
  </div>
</div>
