    <script>

      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user'));
      if (!token || !user || user.role !== 'admin') {
        window.location.href = '../login.html';
      }

  <body class="bg-slate-50 text-slate-800 font-sans antialiased flex h-screen overflow-hidden">

    <script>
            document.getElementById('userNameDisplay').textContent = user.username;
      
      // Logout dengan SweetAlert
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        const result = await Swal.fire({
          title: 'Konfirmasi Logout',
          text: 'Apakah Anda yakin ingin keluar dari dashboard?',
          icon: 'question',
          showCancelButton: true,
          confirmButtonColor: '#ef4444',
          cancelButtonColor: '#64748b',
          confirmButtonText: 'Ya, Keluar',
          cancelButtonText: 'Batal',
          reverseButtons: true,
          customClass: {
            popup: 'rounded-2xl',
            title: 'text-xl font-bold',
            confirmButton: 'px-4 py-2 text-sm font-medium',
            cancelButton: 'px-4 py-2 text-sm font-medium'
          }
        });

        if (result.isConfirmed) {
          // Menampilkan loading toast
          Swal.fire({
            title: 'Logging out...',
            text: 'Mohon tunggu sebentar',
            icon: 'info',
            showConfirmButton: false,
            allowOutsideClick: false,
            didOpen: () => {
              Swal.showLoading();
            }
          });

          // Simulasi delay sedikit untuk memberikan efek loading
          setTimeout(() => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            
            Swal.fire({
              title: 'Berhasil Logout!',
              text: 'Anda akan dialihkan ke halaman login',
              icon: 'success',
              confirmButtonColor: '#4f46e5',
              confirmButtonText: 'OK',
              timer: 2000,
              timerProgressBar: true,
              didClose: () => {
                window.location.href = '../login.html';
              }
            });
          }, 500);
        }
      });

      // Sistem Routing SPA
      const navLinks = document.querySelectorAll('.nav-link');
      const mainContent = document.getElementById('main-content');
      const headerTitle = document.getElementById('headerTitle');
      
      const pageTitles = {
        'dashboard': 'Dashboard Admin',
        'kelola-barang': 'Tambah Barang Baru',
        'riwayat-barang': 'Riwayat Semua User',
        'daftar-barang': 'Kelola Barang'
      };

      const routes = {
        'dashboard': async () => {
          headerTitle.textContent = pageTitles.dashboard;
          return renderDashboard();
        },
        'kelola-barang': async () => {
          headerTitle.textContent = pageTitles['kelola-barang'];
          return renderKelolaBarang();
        },
        'riwayat-barang': async () => {
          headerTitle.textContent = pageTitles['riwayat-barang'];
          return renderRiwayatBarang();
        },
        'daftar-barang': async () => {
          headerTitle.textContent = pageTitles['daftar-barang'];
          return renderDaftarBarang();
        }
      };

      async function loadRoute(route) {
        const link = document.querySelector(`[data-route="${route}"]`);
        if (!link) return;
        
        // Update sidebar active state
        navLinks.forEach(l => {
          l.classList.remove('bg-indigo-50', 'text-indigo-700');
          l.classList.add('hover:bg-slate-50', 'text-slate-600');
        });
        link.classList.remove('hover:bg-slate-50', 'text-slate-600');
        link.classList.add('bg-indigo-50', 'text-indigo-700');

        // Show loading
        mainContent.innerHTML = '<div class="flex justify-center items-center h-64"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>';

        if (routes[route]) {
          const html = await routes[route]();
          mainContent.innerHTML = html;
          
          // Execute route specific scripts
          if (route === 'dashboard') {
            await initDashboard();
          } else if (route === 'kelola-barang') {
            setupKelolaBarang();
          } else if (route === 'riwayat-barang') {
            await loadAllRiwayat();
          } else if (route === 'daftar-barang') {
            await loadAdminBarang();
          }
        }
      }

      // DASHBOARD INITIALIZATION
      async function initDashboard() {
        await Promise.all([
          updateStats(),
          loadMasukKeluarChart(),
          loadStokTipis(),
          loadTopKeluar()
        ]);
      }

      async function updateStats() {
        try {
          const [barangRes, masukRes, keluarRes] = await Promise.all([
            fetch('http://localhost:3000/api/barang', {
              headers: { 'Authorization': `Bearer ${token}` }
            }),
            fetch('http://localhost:3000/api/riwayat/stats/total-masuk', {
              headers: { 'Authorization': `Bearer ${token}` }
            }),
            fetch('http://localhost:3000/api/riwayat/stats/total-keluar', {
              headers: { 'Authorization': `Bearer ${token}` }
            })
          ]);
          
          const barang = await barangRes.json();
          const masuk = await masukRes.json();
          const keluar = await keluarRes.json();
          
          document.getElementById('statTotalBarang').textContent = barang.length;
          document.getElementById('statBarangMasuk').textContent = masuk.totalMasuk;
          document.getElementById('statBarangKeluar').textContent = keluar.totalKeluar;
        } catch (err) {
          console.error("Gagal update stats:", err);
        }
      }

async function loadMasukKeluarChart() {
  try {
    const res = await fetch('http://localhost:3000/api/riwayat/stats/chart?range=7', {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    
    if (!res.ok) {
      console.error('Response not OK:', res.status);
      return showEmptyChart();
    }
    
    const data = await res.json();
    console.log('Chart data received:', data);
    
    // Validasi data
    if (!Array.isArray(data) || data.length === 0) {
      console.log('No data for chart');
      return showEmptyChart();
    }
    
    // Proses data untuk chart
    const dateMap = {};
    
    data.forEach(item => {
      // Ambil field tanggal — alias bisa berbeda tergantung versi driver
      const date = item.tanggal || item['DATE(`createdAt`)'] || item['DATE(createdAt)'];
      if (!date) return; // skip jika tanggal tidak terbaca
      
      if (!dateMap[date]) {
        dateMap[date] = { masuk: 0, keluar: 0 };
      }
      
      if (item.tipe === 'masuk') {
        dateMap[date].masuk = parseInt(item.totalJumlah) || 0;
      } else if (item.tipe === 'keluar') {
        dateMap[date].keluar = parseInt(item.totalJumlah) || 0;
      }
    });
    
    const dates = Object.keys(dateMap).sort();
    const masukData = dates.map(d => dateMap[d].masuk);
    const keluarData = dates.map(d => dateMap[d].keluar);
    
    const ctx = document.getElementById('chartMasukKeluar');
    if (!ctx) {
      console.error('Canvas element not found');
      return;
    }
    
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dates.map(d => {
          try {
            const parts = d.split('-');
            if (parts.length === 3) {
              const year = parseInt(parts[0], 10);
              const month = parseInt(parts[1], 10) - 1;
              const day = parseInt(parts[2], 10);
              const dateObj = new Date(year, month, day);
              return dateObj.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric' });
            }
            return d;
          } catch (e) {
            return d;
          }
        }),
        datasets: [
          {
            label: 'Barang Masuk',
            data: masukData,
            backgroundColor: 'rgba(129, 140, 248, 0.8)',
            borderColor: '#818cf8',
            borderWidth: 1,
            borderRadius: 8
          },
          {
            label: 'Barang Keluar',
            data: keluarData,
            backgroundColor: 'rgba(248, 113, 113, 0.8)',
            borderColor: '#f87171',
            borderWidth: 1,
            borderRadius: 8
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              padding: 20,
              font: {
                size: 12
              }
            }
          },
          title: {
            display: dates.length === 0,
            text: 'Belum ada data barang keluar/masuk'
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              stepSize: 1,
              callback: function(value) {
                return Math.floor(value);
              }
            }
          }
        }
      }
    });
    
  } catch (err) {
    console.error('Gagal load chart:', err);
    showEmptyChart();
  }
}

      async function loadStokTipis() {

      // KELOLA BARANG
      function setupKelolaBarang() {
        const form = document.getElementById('formTambahBarang');
        const errorMsg = document.getElementById('formErrorMessage');
        if (!form) return;

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          errorMsg.classList.add('hidden');
          
          const submitBtn = document.getElementById('submitBarangBtn');
          submitBtn.textContent = 'Menyimpan...';
          submitBtn.disabled = true;

          try {
            const formData = new FormData();
            formData.append('nama', document.getElementById('inputNama').value);
            formData.append('harga', document.getElementById('inputHarga').value);
            formData.append('stok', document.getElementById('inputStok').value);
            formData.append('kategori', document.getElementById('inputKategori').value);
            formData.append('barcode', document.getElementById('inputBarcode').value);
            
            const fileInput = document.getElementById('inputFoto');
            if (fileInput.files.length > 0) {
              formData.append('foto', fileInput.files[0]);
            }

            const res = await fetch('http://localhost:3000/api/barang', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` },
              body: formData
            });

            if (res.ok) {
              form.reset();
              Swal.fire({
                icon: 'success',
                title: 'Berhasil!',
                text: 'Barang berhasil ditambahkan!',
                confirmButtonColor: '#4f46e5'
              });
              await updateStats();
              await loadMasukKeluarChart();
            } else {
              const data = await res.json();
              errorMsg.textContent = data.message || 'Gagal menambahkan barang';
              errorMsg.classList.remove('hidden');
            }
          } catch (err) {
            errorMsg.textContent = 'Terjadi kesalahan jaringan.';
            errorMsg.classList.remove('hidden');
          } finally {
            submitBtn.textContent = 'Simpan Barang';
            submitBtn.disabled = false;
          }
        });
      }

      // DAFTAR BARANG
      async function loadAdminBarang() {
        const container = document.getElementById('barangContainer');
        if (!container) return;

        try {
          const res = await fetch('http://localhost:3000/api/barang', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();

          if (data.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-slate-500 py-8">Belum ada barang terdaftar.</div>';
            return;
          }

          container.innerHTML = data.map(item => {
            const fotoUrl = item.foto ? `http://localhost:3000${item.foto}` : 'https://via.placeholder.com/300x200?text=No+Image';
            return `
              <div class="border border-slate-200 rounded-xl overflow-hidden hover:shadow-md transition-shadow bg-white flex flex-col">
                <div class="h-48 bg-slate-100 relative">
                  <img src="${fotoUrl}" alt="${item.nama}" class="w-full h-full object-cover">
                  <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-2 py-1 rounded-md text-xs font-bold text-slate-700 shadow-sm">
                    ${item.kategori || 'Umum'}
                  </div>
                </div>
                <div class="p-5 flex-1 flex flex-col">
                  <h4 class="font-bold text-lg text-slate-800 line-clamp-1">${item.nama}</h4>
                  <div class="flex justify-between items-center mt-2">
                    <p class="text-indigo-600 font-bold">Rp ${item.harga.toLocaleString('id-ID')}</p>
                    <p class="text-sm font-medium ${item.stok > 10 ? 'text-emerald-600 bg-emerald-50' : 'text-amber-600 bg-amber-50'} px-2 py-1 rounded-md">
                      Stok: ${item.stok}
                    </p>
                  </div>
                  <div class="mt-4 pt-4 border-t border-slate-100 flex items-center justify-between">
                    <span class="text-xs font-mono text-slate-500">${item.barcode || '-'}</span>
                    <div class="flex gap-2">
                      <button onclick="openEditModal(${item.id}, '${item.nama}', ${item.harga}, ${item.stok}, '${item.kategori}', '${item.barcode}')" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
                        Edit
                      </button>
                      <button onclick="openDeleteModal(${item.id})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                        Hapus
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }).join('');

          setupEditLogic();
        } catch (error) {
          container.innerHTML = '<div class="col-span-full text-red-500 p-4 bg-red-50 rounded-lg">Gagal memuat daftar barang.</div>';
        }
      }

      // EDIT & DELETE LOGIC
      window.openEditModal = (id, nama, harga, stok, kategori, barcode) => {
        document.getElementById('editId').value = id;
        document.getElementById('editNama').value = nama;
        document.getElementById('editHarga').value = harga;
        document.getElementById('editStok').value = stok;
        document.getElementById('editKategori').value = kategori;
        document.getElementById('editBarcode').value = barcode;
        
        document.getElementById('modalEditBarang').classList.remove('hidden');
        document.getElementById('modalEditBarang').classList.add('flex');
      };

      window.openDeleteModal = (id) => {
        Swal.fire({
          title: 'Hapus Barang?',
          text: 'Data barang yang dihapus tidak dapat dikembalikan.',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#ef4444',
          cancelButtonColor: '#64748b',
          confirmButtonText: 'Ya, hapus!',
          cancelButtonText: 'Batal'
        }).then(async (result) => {
          if (result.isConfirmed) {
            try {
              const res = await fetch(`http://localhost:3000/api/barang/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
              });

              if (res.ok) {
                Swal.fire({
                  icon: 'success',
                  title: 'Dihapus!',
                  text: 'Barang berhasil dihapus.',
                  confirmButtonColor: '#4f46e5'
                });
                await loadAdminBarang();
                await updateStats();
              } else {
                const data = await res.json();
                Swal.fire({
                  icon: 'error',
                  title: 'Gagal!',
                  text: data.message || 'Gagal menghapus barang.',
                  confirmButtonColor: '#4f46e5'
                });
              }
            } catch (err) {
              Swal.fire({
                icon: 'error',
                title: 'Gagal!',
                text: 'Terjadi kesalahan jaringan.',
                confirmButtonColor: '#4f46e5'
              });
            }
          }
        });
      };

      function setupEditLogic() {
        const modal = document.getElementById('modalEditBarang');
        const form = document.getElementById('formEditBarang');
        const cancelBtn = document.getElementById('cancelEditBtn');
        const errorMsg = document.getElementById('editErrorMessage');

        if (!modal) return;

        const closeEditModal = () => {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          errorMsg.classList.add('hidden');
        };

        cancelBtn.onclick = closeEditModal;

        form.onsubmit = async (e) => {
          e.preventDefault();
          const id = document.getElementById('editId').value;
          const submitBtn = document.getElementById('saveEditBtn');
          submitBtn.disabled = true;

          try {
            const res = await fetch(`http://localhost:3000/api/barang/${id}`, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              body: JSON.stringify({
                nama: document.getElementById('editNama').value,
                harga: document.getElementById('editHarga').value,
                stok: document.getElementById('editStok').value,
                kategori: document.getElementById('editKategori').value,
                barcode: document.getElementById('editBarcode').value
              })
            });

            if (res.ok) {
              closeEditModal();
              Swal.fire({
                icon: 'success',
                title: 'Berhasil!',
                text: 'Data barang berhasil diubah.',
                confirmButtonColor: '#4f46e5'
              });
              await loadAdminBarang();
              await updateStats();
            } else {
              const data = await res.json();
              errorMsg.textContent = data.message || 'Gagal update';
              errorMsg.classList.remove('hidden');
            }
          } catch (err) {
            errorMsg.textContent = 'Kesalahan jaringan';
            errorMsg.classList.remove('hidden');
          } finally {
            submitBtn.disabled = false;
          }
        };
      }

      // ROUTING INIT
      window.addEventListener('hashchange', () => {
        const route = window.location.hash.substring(1) || 'dashboard';
        loadRoute(route);
      });

      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const route = link.getAttribute('data-route');
          window.location.hash = route;
        });
      });

      // Load initial route
      const initialRoute = window.location.hash.substring(1) || 'dashboard';
      loadRoute(initialRoute);

    </script>
