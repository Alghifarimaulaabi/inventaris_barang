<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - InvenSync</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' http://localhost:3000; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: http://localhost:3000;"
    />
    <link rel="stylesheet" href="../assets/main.css">
    <script>
      // Auth Check
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user'));
      if (!token || !user || user.role !== 'admin') {
        window.location.href = '../login.html';
      }
    </script>
  </head>

  <body class="bg-slate-50 text-slate-800 font-sans antialiased flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex z-20">
      <div class="h-16 flex items-center px-6 border-b border-slate-200">
        <div class="flex items-center gap-2 text-indigo-600">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
          <span class="text-xl font-bold text-slate-900 tracking-tight">Admin Panel</span>
        </div>
      </div>
      
      <nav class="flex-1 overflow-y-auto py-5 px-4 space-y-1.5" id="sidebar-nav">
        <a href="#" data-route="dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 bg-indigo-50 text-indigo-700 rounded-lg font-medium">
          Dashboard Admin
        </a>
        <a href="#" data-route="kelola-barang" class="nav-link flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 rounded-lg font-medium text-slate-600">
          Tambah Barang
        </a>
        <a href="#" data-route="riwayat-barang" class="nav-link flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 rounded-lg font-medium text-slate-600">
          Riwayat Barang
        </a>
        <a href="#" data-route="daftar-barang" class="nav-link flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 rounded-lg font-medium text-slate-600">
          Kelola Barang
        </a>
      </nav>
      
      <div class="p-4 border-t border-slate-200">
        <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-50 text-red-600 rounded-lg font-medium hover:bg-red-100 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Keluar
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
      
      <!-- Header -->
      <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-10">
        <div class="flex-1 flex items-center">
          <h2 class="text-lg font-semibold text-slate-800">Dashboard Admin</h2>
        </div>
        
        <div class="flex items-center gap-5">
          <span class="text-sm font-medium text-slate-600" id="userNameDisplay">Admin</span>
        </div>
      </header>

      <!-- Content Area -->
      <div id="main-content" class="flex-1 overflow-auto p-6 md:p-8 bg-slate-50/50">
        
        <div class="bg-indigo-600 rounded-2xl p-8 text-white shadow-lg mb-8">
          <h1 class="text-3xl font-bold mb-2">Selamat datang Admin</h1>
          <p class="text-indigo-100">Kelola semua inventaris barang</p>
        </div>

        <div class="flex gap-6">
          <div class="flex-1 shadow-sm bg-white border border-slate-200 rounded-2xl p-6">
            <h3 class="text-slate-500 font-medium text-sm mb-1">Total Barang</h3>
            <p id="statTotalBarang" class="text-3xl font-bold text-slate-900">0</p>
          </div>
          <div class="flex-1 shadow-sm bg-white border border-slate-200 rounded-2xl p-6">
            <h3 class="text-slate-500 font-medium text-sm mb-1">Total barang masuk</h3>
            <p id="statBarangMasuk" class="text-3xl font-bold text-slate-900">0</p>
          </div>
          <div class="flex-1 shadow-sm bg-white border border-slate-200 rounded-2xl p-6">
            <h3 class="text-slate-500 font-medium text-sm mb-1">Total barang keluar</h3>
            <p id="statBarangKeluar" class="text-3xl font-bold text-slate-900">0</p>
          </div>
        </div>

        <!-- Placeholder for barang table from existing renderer.js -->
        <div class="mt-8 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
          <h3 class="text-lg font-semibold mb-4 text-slate-800">Daftar Barang</h3>
          <p class="text-slate-500 mb-4">halaman admin</p>
          <!-- Kita bisa panggil script eksisting renderer.js atau memodifikasinya untuk attach ke container ini -->
        </div>

      </div>
      
    </main>

    <script>
      document.getElementById('userNameDisplay').textContent = user.username;
      
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '../login.html';
      });

      // Sistem Routing SPA (Single Page Application)
      const navLinks = document.querySelectorAll('.nav-link');
      const mainContent = document.getElementById('main-content');
      
      // Simpan tampilan default dashboard saat pertama kali load
      const defaultDashboardContent = mainContent.innerHTML;

      const routes = {
        'dashboard': async () => defaultDashboardContent,
        'kelola-barang': async () => {
          try {
            return await window.api.getPageContent('admin/kelola-barang');
          } catch(e) {
            return '<div class="p-6 text-red-500">Gagal memuat halaman Kelola Barang. File belum ada.</div>';
          }
        },
        'riwayat-barang': async () => {
          try {
            return await window.api.getPageContent('admin/riwayat-barang');
          } catch(e) {
            return '<div class="p-6 text-red-500">Gagal memuat halaman riwayat barang. File belum ada.</div>';
          }
        },
        'daftar-barang': async () => {
          try {
            return await window.api.getPageContent('admin/daftar-barang');
          } catch(e) {
            return '<div class="p-6 text-red-500">Gagal memuat halaman Daftar Barang. File belum ada.</div>';
          }
        }
      };

      function loadRoute(route) {
        const link = document.querySelector(`[data-route="${route}"]`);
        if (!link) return;
        
        // Ubah class aktif pada sidebar
        navLinks.forEach(l => {
          l.classList.remove('bg-indigo-50', 'text-indigo-700');
          l.classList.add('hover:bg-slate-50', 'text-slate-600');
        });
        link.classList.remove('hover:bg-slate-50', 'text-slate-600');
        link.classList.add('bg-indigo-50', 'text-indigo-700');

        // Render konten halaman
        if (routes[route]) {
          mainContent.innerHTML = '<div class="flex justify-center items-center h-full"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div></div>';
          routes[route]().then(html => {
            mainContent.innerHTML = html;
            
            // Execute route specific scripts
            if (route === 'dashboard') {
              updateStats();
            } else if (route === 'kelola-barang') {
              setupKelolaBarang();
            } else if (route === 'daftar-barang') {
              loadAdminBarang();
            }
          });
        }
      }

      window.addEventListener('hashchange', () => {
        const route = window.location.hash.substring(1) || 'dashboard';
        loadRoute(route);
      });

      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const route = link.getAttribute('data-route');
          window.location.hash = route;
        });
      });

      // Load initial route on startup
      const initialRoute = window.location.hash.substring(1) || 'dashboard';
      loadRoute(initialRoute);

      // --- Route Specific Logic ---

      async function updateStats() {
        try {
          const res = await fetch('http://localhost:3000/api/barang', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          
          const totalBarang = document.getElementById('statTotalBarang');
          const totalMasuk = document.getElementById('statBarangMasuk');
          
          if (totalBarang) totalBarang.textContent = data.length;
          if (totalMasuk) {
            const sumStok = data.reduce((acc, item) => acc + item.stok, 0);
            totalMasuk.textContent = sumStok;
          }
        } catch (err) {
          console.error("Gagal update stats:", err);
        }
      }

      function setupKelolaBarang() {
        const btnTambah = document.getElementById('btnTambahBarang');
        const modal = document.getElementById('modalTambahBarang');
        const btnClose = document.getElementById('closeModalBtn');
        const btnCancel = document.getElementById('cancelModalBtn');
        const form = document.getElementById('formTambahBarang');
        const errorMsg = document.getElementById('formErrorMessage');

        if (!btnTambah || !modal) return;

        const closeModal = () => {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          form.reset();
          errorMsg.classList.add('hidden');
        };

        btnTambah.addEventListener('click', () => {
          modal.classList.remove('hidden');
          modal.classList.add('flex');
        });

        btnClose.addEventListener('click', closeModal);
        btnCancel.addEventListener('click', closeModal);

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          errorMsg.classList.add('hidden');
          
          const submitBtn = document.getElementById('submitBarangBtn');
          submitBtn.textContent = 'Menyimpan...';
          submitBtn.disabled = true;

          try {
            const formData = new FormData();
            formData.append('nama', document.getElementById('inputNama').value);
            formData.append('harga', document.getElementById('inputHarga').value);
            formData.append('stok', document.getElementById('inputStok').value);
            formData.append('kategori', document.getElementById('inputKategori').value);
            formData.append('barcode', document.getElementById('inputBarcode').value);
            
            const fileInput = document.getElementById('inputFoto');
            if (fileInput.files.length > 0) {
              formData.append('foto', fileInput.files[0]);
            }

            const res = await fetch('http://localhost:3000/api/barang', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`
              },
              body: formData
            });

            const data = await res.json();
            
            if (res.ok) {
              closeModal();
              window.location.hash = 'daftar-barang';
            } else {
              errorMsg.textContent = data.message || 'Gagal menambahkan barang';
              errorMsg.classList.remove('hidden');
            }
          } catch (err) {
            errorMsg.textContent = 'Terjadi kesalahan jaringan.';
            errorMsg.classList.remove('hidden');
          } finally {
            submitBtn.textContent = 'Simpan';
            submitBtn.disabled = false;
          }
        });
      }

      async function loadAdminBarang() {
        const container = document.getElementById('barangContainer');
        if (!container) return;

        try {
          const res = await fetch('http://localhost:3000/api/barang', {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });
          const data = await res.json();

          if (data.length === 0) {
            container.innerHTML = '<div class="text-center text-slate-500 py-8">Belum ada barang terdaftar.</div>';
            return;
          }

          let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">';
          data.forEach(item => {
            const fotoUrl = item.foto ? `http://localhost:3000${item.foto}` : '../assets/electron.svg';
            html += `
              <div class="border border-slate-200 rounded-xl overflow-hidden hover:shadow-md transition-shadow bg-white flex flex-col">
                <div class="h-48 bg-slate-100 relative">
                  <img src="${fotoUrl}" alt="${item.nama}" class="w-full h-full object-cover">
                  <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-2 py-1 rounded-md text-xs font-bold text-slate-700 shadow-sm">
                    ${item.kategori || 'Umum'}
                  </div>
                </div>
                <div class="p-5 flex-1 flex flex-col">
                  <h4 class="font-bold text-lg text-slate-800 line-clamp-1">${item.nama}</h4>
                  <div class="flex justify-between items-center mt-2">
                    <p class="text-indigo-600 font-bold">Rp ${item.harga.toLocaleString('id-ID')}</p>
                    <p class="text-sm font-medium ${item.stok > 10 ? 'text-emerald-600 bg-emerald-50' : 'text-amber-600 bg-amber-50'} px-2 py-1 rounded-md">
                      Stok: ${item.stok}
                    </p>
                  </div>
                  <div class="mt-4 pt-4 border-t border-slate-100 flex items-center justify-between">
                    <div class="flex items-center gap-2 text-slate-500">
                      <span class="text-xs font-mono">${item.barcode || '-'}</span>
                    </div>
                    <div class="flex gap-2">
                      <button onclick="openEditModal(${item.id}, '${item.nama}', ${item.harga}, ${item.stok}, '${item.kategori}', '${item.barcode}')" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Edit">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                      </button>
                      <button onclick="openDeleteModal(${item.id})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Hapus">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            `;
          });
          html += '</div>';
          container.innerHTML = html;

          setupEditLogic();
          setupDeleteLogic();

        } catch (error) {
          container.innerHTML = '<div class="text-red-500 p-4 border border-red-200 bg-red-50 rounded-lg">Gagal memuat daftar barang. Terjadi kesalahan koneksi.</div>';
        }
      }

      // --- Global functions for buttons ---
      window.openEditModal = (id, nama, harga, stok, kategori, barcode) => {
        document.getElementById('editId').value = id;
        document.getElementById('editNama').value = nama;
        document.getElementById('editHarga').value = harga;
        document.getElementById('editStok').value = stok;
        document.getElementById('editKategori').value = kategori;
        document.getElementById('editBarcode').value = barcode;
        
        const modal = document.getElementById('modalEditBarang');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
      };

      window.openDeleteModal = (id) => {
        document.getElementById('deleteId').value = id;
        const modal = document.getElementById('modalDeleteBarang');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
      };

      function setupEditLogic() {
        const modal = document.getElementById('modalEditBarang');
        const form = document.getElementById('formEditBarang');
        const closeBtn = document.getElementById('closeEditModalBtn');
        const cancelBtn = document.getElementById('cancelEditBtn');
        const errorMsg = document.getElementById('editErrorMessage');

        if (!modal) return;

        const closeEditModal = () => {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          errorMsg.classList.add('hidden');
        };

        closeBtn.onclick = closeEditModal;
        cancelBtn.onclick = closeEditModal;

        form.onsubmit = async (e) => {
          e.preventDefault();
          const id = document.getElementById('editId').value;
          const submitBtn = document.getElementById('saveEditBtn');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Menyimpan...';

          try {
            const res = await fetch(`http://localhost:3000/api/barang/${id}`, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              body: JSON.stringify({
                nama: document.getElementById('editNama').value,
                harga: document.getElementById('editHarga').value,
                stok: document.getElementById('editStok').value,
                kategori: document.getElementById('editKategori').value,
                barcode: document.getElementById('editBarcode').value
              })
            });

            if (res.ok) {
              closeEditModal();
              loadAdminBarang();
            } else {
              const data = await res.json();
              errorMsg.textContent = data.message || 'Gagal update barang';
              errorMsg.classList.remove('hidden');
            }
          } catch (err) {
            errorMsg.textContent = 'Kesalahan jaringan';
            errorMsg.classList.remove('hidden');
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Simpan Perubahan';
          }
        };
      }

      function setupDeleteLogic() {
        const modal = document.getElementById('modalDeleteBarang');
        const cancelBtn = document.getElementById('cancelDeleteBtn');
        const confirmBtn = document.getElementById('confirmDeleteBtn');

        if (!modal) return;

        const closeDeleteModal = () => {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
        };

        cancelBtn.onclick = closeDeleteModal;

        confirmBtn.onclick = async () => {
          const id = document.getElementById('deleteId').value;
          confirmBtn.disabled = true;
          confirmBtn.textContent = 'Menghapus...';

          try {
            const res = await fetch(`http://localhost:3000/api/barang/${id}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
              closeDeleteModal();
              loadAdminBarang();
            }
          } catch (err) {
            alert('Gagal menghapus barang');
          } finally {
            confirmBtn.disabled = false;
            confirmBtn.textContent = 'Hapus';
          }
        };
      }

    </script>
  </body>
</html>
