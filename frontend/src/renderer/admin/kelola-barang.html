<div>
  <h2 class="text-2xl font-bold text-slate-800 mb-4">Kelola Barang</h2>
  <p class="text-slate-500 mb-6">Di sini kamu bisa menambah, mengedit, atau menghapus data barang.</p>
  
  <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
    <button id="btnTambahBarang" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors mb-4 flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      Tambah Barang
    </button>
    <div id="kelolaBarangContainer" class="text-sm text-slate-500">
      Memuat data barang...
    </div>
  </div>

  <!-- Modal Tambah Barang -->
  <div id="modalTambahBarang" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-slate-800">Tambah Barang Baru</h3>
        <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      
      <form id="formTambahBarang" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nama Barang</label>
          <input type="text" id="inputNama" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Harga (Rp)</label>
            <input type="number" id="inputHarga" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Stok</label>
            <input type="number" id="inputStok" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
          <select id="inputKategori" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <option value="">Pilih Kategori</option>
            <option value="Elektronik">Elektronik</option>
            <option value="Perabotan">Perabotan</option>
            <option value="Alat Tulis">Alat Tulis</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Kode Unit</label>
          <input type="text" id="inputBarcode" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Upload Foto Barang</label>
          <input type="file" id="inputFoto" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
        </div>

        <div id="formErrorMessage" class="text-red-500 text-sm hidden"></div>

        <div class="pt-4 flex justify-end gap-3">
          <button type="button" id="cancelModalBtn" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg font-medium hover:bg-slate-200 transition-colors">Batal</button>
          <button type="submit" id="submitBarangBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors">Simpan</button>
        </div>
      </form>
    </div>
  </div>
</div>
