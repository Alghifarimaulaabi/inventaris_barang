<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard - InvenSync</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; connect-src 'self' http://localhost:3000; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: http://localhost:3000;" />
  <link rel="stylesheet" href="../assets/main.css">
  <!-- SweetAlert2 dari file lokal -->
  <script type="module">
    import Swal from 'sweetalert2'
    window.Swal = Swal;
  </script>
  <script>
    // Auth Check
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));
    if (!token || !user) {
      window.location.href = '../login.html';
    }
  </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex z-20">
    <div class="h-16 flex items-center px-6 border-b border-slate-200">
      <div class="flex items-center gap-2 text-indigo-600">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        <span class="text-xl font-bold text-slate-900 tracking-tight">Inventaris</span>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto py-5 px-4 space-y-1.5" id="sidebar-nav">
      <a href="#" data-route="dashboard"
        class="nav-link flex items-center gap-3 px-3 py-2.5 bg-indigo-50 text-indigo-700 rounded-lg font-medium">
        Dashboard
      </a>
      <a href="#" data-route="lihat-barang" class="nav-link flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 rounded-lg font-medium text-slate-600">
        Data Barang
      </a>
      <a href="#" data-route="kategori" class="nav-link flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 rounded-lg font-medium text-slate-600">
        Kategori
      </a>
      <a href="#" data-route="riwayat" class="nav-link flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 rounded-lg font-medium text-slate-600">
        Riwayat
      </a>
    </nav>
    <div class="p-4 border-t border-slate-200">
      <button id="logoutBtn"
        class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-slate-100 text-slate-600 rounded-lg font-medium hover:bg-slate-200 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        Keluar
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-10">
      <div class="flex-1 flex items-center">
        <h2 class="text-lg font-semibold text-slate-800">Dashboard</h2>
      </div>

      <div class="flex items-center gap-5">
        <div class="flex items-center gap-2">
          <div>

          </div>
          <span class="text-sm font-medium text-slate-600" id="userNameDisplay">User</span>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div id="main-content" class="flex-1 overflow-auto p-6 md:p-8 bg-slate-50/50">
    </div>

  </main>

  <!-- Modal Barang Keluar -->
  <div id="keluarModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50 transition-opacity duration-300 opacity-0">
    <div class="bg-white rounded-2xl max-w-md w-full mx-4 shadow-xl border border-slate-100 transform scale-95 transition-transform duration-300">
      <div class="flex items-center justify-between p-6 border-b border-slate-100">
        <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
          <svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Barang Keluar
        </h3>
        <button onclick="closeKeluarModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1.5 hover:bg-slate-100 rounded-lg cursor-pointer border-none">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      
      <form id="keluarForm" class="p-6 space-y-4">
        <input type="hidden" id="keluarBarangId">
        
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nama Barang</label>
          <input type="text" id="keluarNamaBarang" readonly class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 font-medium focus:outline-none cursor-not-allowed">
        </div>
        
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Stok Tersedia</label>
          <input type="text" id="keluarStokTersedia" readonly class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 font-medium focus:outline-none cursor-not-allowed">
        </div>
        
        <div>
          <label for="keluarJumlah" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Jumlah Keluar</label>
          <input type="number" id="keluarJumlah" placeholder="Masukkan jumlah barang keluar" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:border-rose-500 focus:ring-4 focus:ring-rose-500/10 focus:outline-none transition-all font-medium">
          <p id="errorJumlah" class="text-xs text-rose-500 font-medium mt-1 hidden"></p>
        </div>
        
        <div>
          <label for="keluarKeterangan" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Keterangan</label>
          <textarea id="keluarKeterangan" rows="3" placeholder="Alasan atau catatan pengeluaran barang..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:border-rose-500 focus:ring-4 focus:ring-rose-500/10 focus:outline-none transition-all font-medium resize-none"></textarea>
          <p id="errorKeterangan" class="text-xs text-rose-500 font-medium mt-1 hidden"></p>
        </div>
        
        <div class="pt-4 flex gap-3">
          <button type="button" onclick="closeKeluarModal()" class="flex-1 py-2.5 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl font-semibold transition-colors cursor-pointer text-center bg-transparent">Batal</button>
          <button type="submit" class="flex-1 py-2.5 bg-rose-500 hover:bg-rose-600 text-white rounded-xl font-semibold shadow-md shadow-rose-500/20 hover:shadow-rose-500/30 transition-all cursor-pointer border-none">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <script>

    // Logout dengan SweetAlert
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        const result = await Swal.fire({
          title: 'Konfirmasi Logout',
          text: 'Apakah Anda yakin ingin keluar dari dashboard?',
          icon: 'question',
          showCancelButton: true,
          confirmButtonColor: '#ef4444',
          cancelButtonColor: '#64748b',
          confirmButtonText: 'Ya, Keluar',
          cancelButtonText: 'Batal',
          reverseButtons: true,
          customClass: {
            popup: 'rounded-2xl',
            title: 'text-xl font-bold',
            confirmButton: 'px-4 py-2 text-sm font-medium',
            cancelButton: 'px-4 py-2 text-sm font-medium'
          }
        });

        if (result.isConfirmed) {
          // Menampilkan loading toast
          Swal.fire({
            title: 'Logging out...',
            text: 'Mohon tunggu sebentar',
            icon: 'info',
            showConfirmButton: false,
            allowOutsideClick: false,
            didOpen: () => {
              Swal.showLoading();
            }
          });

          // Simulasi delay sedikit untuk memberikan efek loading
          setTimeout(() => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            
            Swal.fire({
              title: 'Berhasil Logout!',
              text: 'Anda akan dialihkan ke halaman login',
              icon: 'success',
              confirmButtonColor: '#4f46e5',
              confirmButtonText: 'OK',
              timer: 2000,
              timerProgressBar: true,
              didClose: () => {
                window.location.href = '../login.html';
              }
            });
          }, 500);
        }
      });

    document.getElementById('userNameDisplay').textContent = user.username;



    // Sistem Routing SPA (Single Page Application)
    const navLinks = document.querySelectorAll('.nav-link');
    const mainContent = document.getElementById('main-content');
    
    const routes = {
      'dashboard': async () => {
        try {
          const content = await window.api.getPageContent('user/dashboard');
          setTimeout(() => {
            const welcome = document.getElementById('welcomeName');
            if (welcome) welcome.textContent = user.username;
          }, 50);
          return content;
        } catch(e) {
          return '<div class="p-6 text-red-500">Gagal memuat halaman Dashboard. File belum ada.</div>';
        }
      },
      'lihat-barang': async () => {
        try {
          const content = await window.api.getPageContent('user/lihat-barang');
          setTimeout(loadBarang, 50);
          return content;
        } catch(e) {
          return '<div class="p-6 text-red-500">Gagal memuat halaman Lihat Barang. File belum ada.</div>';
        }
      },
      'kategori': async () => {
        try {
          return await window.api.getPageContent('user/kategori');
        } catch(e) {
          return '<div class="p-6 text-red-500">Gagal memuat halaman Kategori. File belum ada.</div>';
        }
      },
      'riwayat': async () => {
        try {
          const content = await window.api.getPageContent('user/riwayat');
          setTimeout(loadRiwayat, 50);
          return content;
        } catch(e) {
          return '<div class="p-6 text-red-500">Gagal memuat halaman Riwayat. File belum ada.</div>';
        }
      }
    };

    function loadRoute(route) {
      const link = document.querySelector(`[data-route="${route}"]`);
      if (!link) return;
      
      // Ubah class aktif pada sidebar
      navLinks.forEach(l => {
        l.classList.remove('bg-indigo-50', 'text-indigo-700');
        l.classList.add('hover:bg-slate-50', 'text-slate-600');
      });
      link.classList.remove('hover:bg-slate-50', 'text-slate-600');
      link.classList.add('bg-indigo-50', 'text-indigo-700');

      // Render konten halaman
      if (routes[route]) {
        mainContent.innerHTML = '<div class="flex justify-center items-center h-full"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div></div>';
        routes[route]().then(html => {
          mainContent.innerHTML = html;
        });
      }
    }

    window.addEventListener('hashchange', () => {
      const route = window.location.hash.substring(1) || 'dashboard';
      loadRoute(route);
    });

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const route = link.getAttribute('data-route');
        window.location.hash = route;
      });
    });

    let userBarangData = [];

    // Simple fetch for user to just see items
    async function loadBarang() {
      try {
        const res = await fetch('http://localhost:3000/api/barang', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        userBarangData = await res.json();
        
        const selectKategori = document.getElementById('filterUserKategori');
        if (selectKategori && selectKategori.options.length <= 1) {
          const kategories = [...new Set(userBarangData.map(item => item.kategori).filter(Boolean))];
          kategories.forEach(kat => {
            const opt = document.createElement('option');
            opt.value = kat;
            opt.textContent = kat;
            selectKategori.appendChild(opt);
          });
          
          document.getElementById('searchUserBarang')?.addEventListener('input', renderUserBarangList);
          selectKategori.addEventListener('change', renderUserBarangList);
        }

        renderUserBarangList();

      } catch (error) {
        document.getElementById('barangContainer').innerHTML = 'Gagal memuat barang.';
      }
    }

    function renderUserBarangList() {
      const container = document.getElementById('barangContainer');
      if (!container) return;
      
      const searchQuery = document.getElementById('searchUserBarang')?.value.toLowerCase() || '';
      const filterKat = document.getElementById('filterUserKategori')?.value || '';
      
      const filteredData = userBarangData.filter(item => {
        const matchSearch = item.nama.toLowerCase().includes(searchQuery);
        const matchKat = filterKat === '' || item.kategori === filterKat;
        return matchSearch && matchKat;
      });

      if (filteredData.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-500 py-8">Barang tidak ditemukan.</div>';
        return;
      }

      let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">';
      filteredData.forEach(item => {
        const fotoUrl = item.foto ? `http://localhost:3000${item.foto}` : '../assets/electron.svg';
        html += `
          <div class="border border-slate-200 rounded-xl overflow-hidden hover:shadow-md transition-shadow bg-white flex flex-col">
            <div class="h-48 bg-slate-100 relative">
              <img src="${fotoUrl}" alt="${item.nama}" class="w-full h-full object-cover">
              <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-2 py-1 rounded-md text-xs font-bold text-slate-700 shadow-sm">
                ${item.kategori || 'Umum'}
              </div>
            </div>
            <div class="p-5 flex-1 flex flex-col">
              <h4 class="font-bold text-lg text-slate-800 line-clamp-1">${item.nama}</h4>
              <div class="flex justify-between items-center mt-2">
                <p class="text-indigo-600 font-bold">Rp ${item.harga.toLocaleString('id-ID')}</p>
                <p class="text-sm font-medium ${item.stok > 10 ? 'text-emerald-600 bg-emerald-50' : 'text-amber-600 bg-amber-50'} px-2 py-1 rounded-md">
                  Stok: ${item.stok}
                </p>
              </div>
              <div class="mt-4 pt-4 border-t border-slate-100 flex items-center justify-between">
                <div class="flex items-center gap-2 text-slate-500">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                  <span class="text-xs font-mono">${item.barcode || '-'}</span>
                </div>
                <button onclick="openKeluarModal(${item.id}, '${item.nama.replace(/'/g, "\\'")}', ${item.stok})" class="px-3 py-1.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg text-xs font-semibold flex items-center gap-1.5 transition-colors shadow-sm cursor-pointer border-none">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  Barang Keluar
                </button>
              </div>              </div>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // Modal & Outgoing Goods Features
    let riwayatData = [];

    window.openKeluarModal = function(id, nama, stok) {
      document.getElementById('keluarBarangId').value = id;
      document.getElementById('keluarNamaBarang').value = nama;
      document.getElementById('keluarStokTersedia').value = stok;
      document.getElementById('keluarJumlah').value = '';
      document.getElementById('keluarKeterangan').value = '';
      
      // Clear errors
      document.getElementById('errorJumlah').classList.add('hidden');
      document.getElementById('errorKeterangan').classList.add('hidden');
      
      const modal = document.getElementById('keluarModal');
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.querySelector('.transform').classList.remove('scale-95');
      }, 50);
    }

    window.closeKeluarModal = function() {
      const modal = document.getElementById('keluarModal');
      modal.classList.add('opacity-0');
      modal.querySelector('.transform').classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 300);
    }

    document.getElementById('keluarForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const barangId = document.getElementById('keluarBarangId').value;
      const jumlah = document.getElementById('keluarJumlah').value;
      const keterangan = document.getElementById('keluarKeterangan').value;
      const stokTersedia = parseInt(document.getElementById('keluarStokTersedia').value, 10);
      
      let hasError = false;
      
      // Validate jumlah
      const errorJumlah = document.getElementById('errorJumlah');
      const qty = parseInt(jumlah, 10);
      if (!jumlah || isNaN(qty) || qty <= 0) {
        errorJumlah.textContent = 'Jumlah barang keluar harus lebih besar dari 0.';
        errorJumlah.classList.remove('hidden');
        hasError = true;
      } else if (qty > stokTersedia) {
        errorJumlah.textContent = `Jumlah keluar tidak boleh melebihi stok tersedia (${stokTersedia}).`;
        errorJumlah.classList.remove('hidden');
        hasError = true;
      } else {
        errorJumlah.classList.add('hidden');
      }
      
      // Validate keterangan
      const errorKeterangan = document.getElementById('errorKeterangan');
      if (!keterangan || keterangan.trim().length < 3) {
        errorKeterangan.textContent = 'Keterangan wajib diisi minimal 3 karakter.';
        errorKeterangan.classList.remove('hidden');
        hasError = true;
      } else {
        errorKeterangan.classList.add('hidden');
      }
      
      if (hasError) return;
      
      try {
        const res = await fetch('http://localhost:3000/api/riwayat/keluar', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            barangId,
            jumlah: qty,
            keterangan: keterangan.trim()
          })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          Swal.fire({
            icon: 'error',
            title: 'Gagal!',
            text: data.message || 'Gagal menyimpan transaksi barang keluar.',
            confirmButtonColor: '#4f46e5'
          });
          return;
        }
        
        // Success
        closeKeluarModal();
        
        Swal.fire({
          icon: 'success',
          title: 'Berhasil!',
          text: 'Transaksi barang keluar berhasil disimpan.',
          confirmButtonColor: '#4f46e5'
        }).then(() => {
          // Redirect to riwayat
          window.location.hash = 'riwayat';
        });
      } catch (err) {
        console.error('Error submitting barang keluar:', err);
        Swal.fire({
          icon: 'error',
          title: 'Gagal!',
          text: 'Terjadi kesalahan koneksi ke server.',
          confirmButtonColor: '#4f46e5'
        });
      }
    });

    async function loadRiwayat() {
      try {
        const res = await fetch('http://localhost:3000/api/riwayat', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        const data = await res.json();
        riwayatData = data;
        
        renderRiwayatTable(riwayatData);
        
        // Bind search input listener
        const searchInput = document.getElementById('searchRiwayatInput');
        if (searchInput) {
          searchInput.value = ''; // clear old search
          searchInput.removeEventListener('input', filterRiwayat);
          searchInput.addEventListener('input', filterRiwayat);
        }
      } catch (error) {
        console.error('Error loading riwayat:', error);
        const container = document.getElementById('riwayatContainer');
        if (container) {
          container.innerHTML = '<div class="p-6 text-red-500 bg-white rounded-xl border border-slate-200">Gagal memuat data riwayat. Silakan coba lagi.</div>';
        }
      }
    }

    function filterRiwayat() {
      const query = document.getElementById('searchRiwayatInput').value.toLowerCase();
      const filtered = riwayatData.filter(item => item.namaBarang.toLowerCase().includes(query));
      renderRiwayatTable(filtered);
    }

    function renderRiwayatTable(items) {
      const container = document.getElementById('riwayatContainer');
      if (!container) return;
      
      if (items.length === 0) {
        container.innerHTML = `
          <div class="text-slate-500 text-center py-12 bg-white rounded-xl border border-slate-200">
            <svg class="w-12 h-12 text-slate-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="font-medium text-slate-600">Tidak ada riwayat ditemukan</p>
            <p class="text-xs text-slate-400 mt-1">Coba cari kata kunci lain atau buat transaksi barang keluar baru.</p>
          </div>
        `;
        return;
      }
      
      let html = `
        <div class="overflow-x-auto bg-white rounded-xl border border-slate-200 shadow-sm">
          <table class="w-full border-collapse text-left text-sm text-slate-500">
            <thead class="bg-slate-50 text-slate-700 font-semibold uppercase text-xs border-b border-slate-100">
              <tr>
                <th class="px-6 py-4">Tanggal</th>
                <th class="px-6 py-4">Nama Barang</th>
                <th class="px-6 py-4">Jumlah Keluar</th>
                <th class="px-6 py-4">Keterangan</th>
                <th class="px-6 py-4">Operator</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
      `;
      
      items.forEach(item => {
        const date = new Date(item.createdAt);
        const formattedDate = date.toLocaleDateString('id-ID', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        }) + ' ' + date.toLocaleTimeString('id-ID', {
          hour: '2-digit',
          minute: '2-digit'
        });
        
        html += `
          <tr class="hover:bg-slate-50/50 transition-colors">
            <td class="px-6 py-4 font-medium text-slate-900 whitespace-nowrap">${formattedDate}</td>
            <td class="px-6 py-4 font-medium text-slate-800">${item.namaBarang}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-rose-50 text-rose-700">
                <span class="w-1.5 h-1.5 rounded-full bg-rose-600"></span>
                ${item.jumlah}
              </span>
            </td>
            <td class="px-6 py-4 max-w-xs truncate" title="${item.keterangan || ''}">${item.keterangan || '-'}</td>
            <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-600">${item.username}</td>
          </tr>
        `;
      });
      
      html += `
            </tbody>
          </table>
        </div>
      `;
      
      container.innerHTML = html;
    }

    // Load initial route on startup
    const initialRoute = window.location.hash.substring(1) || 'dashboard';
    loadRoute(initialRoute);
  </script>
</body>

</html>
