<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - InvenSync</title>
  <link rel="stylesheet" href="./assets/main.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased flex items-center justify-center min-h-screen">
  
  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-2 text-indigo-600 mb-4">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Selamat Datang</h2>
      <p class="text-sm text-slate-500 mt-1">Silakan masuk ke akun Anda</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="username">Username</label>
        <input type="text" id="username" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
      </div>

      <div id="errorMessage" class="text-red-500 text-sm hidden"></div>

      <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition-colors">
        Masuk
      </button>
    </form>

    <p class="text-center text-sm text-slate-600 mt-6">
      Belum punya akun? <a href="register.html" class="text-indigo-600 font-semibold hover:underline">Daftar sekarang</a>
    </p>
  </div>

  <script src="./src/login.js"></script>
</body>
</html>
