<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvenSync - Manajemen Inventaris</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:"
    />
    <link rel="stylesheet" href="./assets/main.css">
    <script>
      // Auth Redirector
      window.onload = () => {
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');
        
        if (token && userStr) {
          try {
            const user = JSON.parse(userStr);
            if (user.role === 'admin') {
              window.location.replace('admin/dashboard-admin.html');
            } else {
              window.location.replace('user/dashboard-user.html');
            }
          } catch(e) {
            window.location.replace('login.html');
          }
        } else {
          window.location.replace('login.html');
        }
      }
    </script>
  </head>

  <body class="bg-slate-50 text-slate-800 font-sans antialiased flex h-screen items-center justify-center">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
      <p class="mt-4 text-slate-500 font-medium">Memuat InvenSync...</p>
    </div>
  </body>
</html>
